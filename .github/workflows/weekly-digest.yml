name: Weekly post drafts

on:
  schedule:
    - cron: "0 22 * * 1"   # 月曜22:00 UTC = 火曜7:00 JST
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate weekly post drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_URL: ${{ vars.SITE_URL || 'https://aiu24rrf-hub.github.io/freetierwatch/' }}
        run: python scripts/weekly_digest.py
